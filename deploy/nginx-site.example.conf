# NAPTIN — Nginx example
# Ports: 4002 Node (/api/v1), 4003 Owl Talk (/api + /socket.io)
# Place in /etc/nginx/sites-available/naptin and adjust server_name + ssl paths.

server {
    listen 80;
    listen [::]:80;
    server_name portal.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portal.example.com;

    ssl_certificate     /etc/letsencrypt/live/portal.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.example.com/privkey.pem;

    root /opt/naptin/app/dist;
    index index.html;

    # --- Node workbench API (MUST be before /api/ for Owl Talk) ---
    location /api/v1/ {
        proxy_pass http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Owl Talk (Python) on 127.0.0.1:4003 — HTTP ---
    location /api/ {
        proxy_pass http://127.0.0.1:4003/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:4003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# If Owl Talk runs HTTPS on 4003 with self-signed cert instead, use:
#   proxy_pass https://127.0.0.1:4003/...;
#   proxy_ssl_verify off;
