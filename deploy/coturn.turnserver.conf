# Minimal coturn configuration for NAPTIN chat WebRTC.
# Replace values to match your host and rotate credentials regularly.

listening-port=3478
tls-listening-port=5349

# Use your server public IP (or private IP for LAN-only testing)
external-ip=YOUR_SERVER_PUBLIC_IP

realm=naptin.local
server-name=naptin-turn
fingerprint
lt-cred-mech

# Long-term credential user (maps to VITE_CHAT_TURN_USERNAME)
user=naptin-turn-user:replace-with-strong-secret

# For TURN relay reliability behind NAT/firewall
no-multicast-peers
no-loopback-peers

# TLS certificates for turns: (optional but recommended)
# cert=/etc/ssl/certs/fullchain.pem
# pkey=/etc/ssl/private/privkey.pem
